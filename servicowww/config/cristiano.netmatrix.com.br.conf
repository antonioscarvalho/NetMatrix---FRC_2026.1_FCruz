<VirtualHost *:80>
    ServerName cristiano.netmatrix.com.br
    DocumentRoot /var/www/cristiano.netmatrix.com.br
    <Directory /var/www/cristiano.netmatrix.com.br>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/cristiano_error.log
    CustomLog ${APACHE_LOG_DIR}/cristiano_access.log combined
</VirtualHost>
