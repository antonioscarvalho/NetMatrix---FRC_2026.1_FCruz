<VirtualHost *:80>
    ServerName antonio.netmatrix.com.br
    DocumentRoot /var/www/antonio.netmatrix.com.br
    <Directory /var/www/antonio.netmatrix.com.br>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/antonio_error.log
    CustomLog ${APACHE_LOG_DIR}/antonio_access.log combined
</VirtualHost>
