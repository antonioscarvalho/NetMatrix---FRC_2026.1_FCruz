<VirtualHost *:80>
    ServerName luana.netmatrix.com.br
    DocumentRoot /var/www/luana.netmatrix.com.br
    <Directory /var/www/luana.netmatrix.com.br>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/luana_error.log
    CustomLog ${APACHE_LOG_DIR}/luana_access.log combined
</VirtualHost>
