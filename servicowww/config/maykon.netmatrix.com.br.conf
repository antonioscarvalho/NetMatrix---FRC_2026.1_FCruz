<VirtualHost *:80>
    ServerName maykon.netmatrix.com.br
    DocumentRoot /var/www/maykon.netmatrix.com.br
    <Directory /var/www/maykon.netmatrix.com.br>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/maykon_error.log
    CustomLog ${APACHE_LOG_DIR}/maykon_access.log combined
</VirtualHost>
